[project]
name = "cyber-dashboard-database"
version = "0.1.0"
description = "Connexion PostgreSQL, modèles SQLAlchemy et repositories communs"
readme = "README.md"
authors = [
    { name = "Dev", email = "dev@ch-vauclaire.fr" }
]
requires-python = ">=3.12"
dependencies = [
    "psycopg[binary]>=3.3.4",
    "sqlalchemy>=2.0.51",
]

[build-system]
requires = ["uv_build>=0.10.11,<0.11.0"]
build-backend = "uv_build"
