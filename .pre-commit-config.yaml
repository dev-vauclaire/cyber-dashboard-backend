# Hooks linters et formatters pour le code source

repos:
  # Vérifications de base
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
        args: ['--unsafe']
      - id: check-toml
      - id: check-json
      - id: check-added-large-files
        args: ['--maxkb=500']
      - id: check-merge-conflict
      - id: detect-private-key
      - id: check-case-conflict
      - id: mixed-line-ending
        args: ['--fix=lf']

  # Markdown
  - repo: https://github.com/igorshubovych/markdownlint-cli
    rev: v0.49.0
    hooks:
      - id: markdownlint
        args: ['--fix']

# Formatage Python
  - repo: https://github.com/psf/black
    rev: 26.5.1
    hooks:
      - id: black

  # Python
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.20
    hooks:
      - id: ruff
        args: ['--fix']

# Hooks pour la sécurité

  # Secret scanning
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.30.0
    hooks:
      - id: gitleaks

  # Dependency SBOM and vulnerability scan (SCA)
  - repo: local
    hooks:
      - id: uv-lock-sbom-grype
        name: Generate uv.lock SBOM and scan with Grype
        entry: scripts/check_uv_lock_vulnerabilities.sh
        language: system
        files: ^uv\.lock$
        pass_filenames: false
        verbose: true
